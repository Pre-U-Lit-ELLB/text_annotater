
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }

  .cr-shell {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 0;
    min-height: 600px;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    overflow: hidden;
    background: var(--color-background-primary);
  }

  /* ── TOOLBAR ── */
  .cr-toolbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-secondary);
    flex-wrap: wrap;
  }
  .cr-title-block { flex: 1; min-width: 160px; }
  .cr-title-block .poem-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
  .cr-title-block .poem-author { font-size: 12px; color: var(--color-text-secondary); }

  .tool-group { display: flex; align-items: center; gap: 4px; }
  .tool-sep { width: 0.5px; height: 20px; background: var(--color-border-tertiary); margin: 0 4px; }

  .swatch-btn {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer; outline: none;
    transition: transform 0.1s;
    flex-shrink: 0;
  }
  .swatch-btn:hover { transform: scale(1.15); }
  .swatch-btn.active { border-color: var(--color-text-primary); }

  .tool-btn {
    font-size: 12px; padding: 4px 9px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    cursor: pointer;
    transition: background 0.1s;
    white-space: nowrap;
  }
  .tool-btn:hover { background: var(--color-background-secondary); }
  .tool-btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }

  .mode-label {
    font-size: 11px; color: var(--color-text-secondary);
    padding: 2px 6px;
    border-radius: var(--border-radius-md);
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
  }

  /* ── MAIN TEXT PANE ── */
  .cr-text-pane {
    padding: 28px 28px 28px 20px;
    overflow-y: auto;
    border-right: 0.5px solid var(--color-border-tertiary);
    position: relative;
  }

  .line-wrapper {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 3px;
    min-height: 24px;
  }
  .line-num {
    font-size: 11px;
    color: var(--color-text-tertiary);
    min-width: 20px;
    text-align: right;
    user-select: none;
    flex-shrink: 0;
    font-family: var(--font-mono);
    padding-top: 2px;
  }
  .line-text {
    font-family: var(--font-serif);
    font-size: 16px;
    line-height: 1.75;
    color: var(--color-text-primary);
    flex: 1;
    cursor: text;
  }
  .stanza-break { height: 14px; }

  mark.hl {
    border-radius: 3px;
    padding: 1px 0;
    cursor: pointer;
    position: relative;
  }
  mark.hl:hover::after {
    content: attr(data-cat);
    position: absolute;
    bottom: 100%;
    left: 0;
    font-size: 10px;
    font-family: var(--font-sans);
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    color: var(--color-text-secondary);
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 10;
  }

  /* focus mode */
  .cr-text-pane.focus-mode .line-wrapper:not(.focused-line) .line-text {
    opacity: 0.18;
  }
  .line-wrapper.focused-line .line-text { opacity: 1; }

  /* glossary tooltip */
  .gloss-word {
    border-bottom: 1px dashed var(--color-border-secondary);
    cursor: help;
    position: relative;
  }

  /* ── SIDEBAR ── */
  .cr-sidebar {
    display: flex;
    flex-direction: column;
  }

  .sidebar-section {
    padding: 14px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }
  .sidebar-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--color-text-tertiary);
    margin-bottom: 8px;
    font-weight: 500;
  }

  /* legend */
  .legend-grid { display: flex; flex-direction: column; gap: 5px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--color-text-secondary); }
  .legend-dot { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }

  /* notepad */
  .notepad {
    flex: 1;
    width: 100%;
    resize: none;
    border: none;
    outline: none;
    font-family: var(--font-sans);
    font-size: 13px;
    line-height: 1.65;
    color: var(--color-text-primary);
    background: transparent;
    padding: 0;
    min-height: 120px;
  }
  .notepad::placeholder { color: var(--color-text-tertiary); }

  /* annotations list */
  .ann-list { display: flex; flex-direction: column; gap: 6px; max-height: 220px; overflow-y: auto; }
  .ann-item {
    font-size: 11px;
    padding: 6px 8px;
    border-radius: var(--border-radius-md);
    background: var(--color-background-secondary);
    border-left: 3px solid;
    cursor: pointer;
    transition: opacity 0.1s;
  }
  .ann-item:hover { opacity: 0.75; }
  .ann-quote { font-style: italic; color: var(--color-text-primary); margin-bottom: 2px; font-family: var(--font-serif); font-size: 12px; }
  .ann-cat { color: var(--color-text-secondary); font-size: 10px; }
  .ann-empty { font-size: 12px; color: var(--color-text-tertiary); font-style: italic; }

  /* glossary panel */
  .gloss-list { display: flex; flex-direction: column; gap: 5px; }
  .gloss-item { font-size: 12px; }
  .gloss-term { font-weight: 500; color: var(--color-text-primary); }
  .gloss-def { color: var(--color-text-secondary); }

  /* tooltip */
  #tooltip {
    position: fixed;
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 6px 10px;
    font-size: 12px;
    max-width: 220px;
    z-index: 999;
    pointer-events: none;
    display: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    color: var(--color-text-secondary);
  }
  #tooltip .t-term { font-weight: 500; color: var(--color-text-primary); display: block; margin-bottom: 2px; }

  /* clear btn small */
  .clear-btn {
    font-size: 10px;
    padding: 2px 6px;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    background: transparent;
    color: var(--color-text-tertiary);
    cursor: pointer;
    float: right;
  }
  .clear-btn:hover { color: var(--color-text-danger); border-color: var(--color-border-danger); }
</style>

<div id="tooltip"><span class="t-term" id="tip-term"></span><span id="tip-def"></span></div>

<div class="cr-shell">

  <!-- TOOLBAR -->
  <div class="cr-toolbar">
    <div class="cr-title-block">
      <div class="poem-title" id="tb-title"></div>
      <div class="poem-author" id="tb-author"></div>
    </div>

    <div class="tool-sep"></div>

    <span style="font-size:11px;color:var(--color-text-tertiary);margin-right:2px;">Highlight as:</span>
    <div class="tool-group" id="swatch-group"></div>

    <div class="tool-sep"></div>

    <button class="tool-btn" id="erase-btn">Erase</button>
    <button class="tool-btn" id="focus-btn">Focus mode</button>
    <button class="tool-btn" id="clear-all-btn">Clear all</button>
  </div>

  <!-- TEXT PANE -->
  <div class="cr-text-pane" id="text-pane"></div>

  <!-- SIDEBAR -->
  <div class="cr-sidebar">

    <div class="sidebar-section">
      <div class="sidebar-label">Highlight key</div>
      <div class="legend-grid" id="legend"></div>
    </div>

    <div class="sidebar-section" style="flex:1; display:flex; flex-direction:column;">
      <div class="sidebar-label">
        Notes
        <button class="clear-btn" id="clear-notes-btn">clear</button>
      </div>
      <textarea class="notepad" id="notepad" placeholder="Jot observations, draft a response, track patterns…"></textarea>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Highlights log</div>
      <div class="ann-list" id="ann-list"><span class="ann-empty">No highlights yet.</span></div>
    </div>

    <div class="sidebar-section" id="gloss-section" style="display:none;">
      <div class="sidebar-label">Glossary</div>
      <div class="gloss-list" id="gloss-list"></div>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  TEMPLATE CONFIG — swap this object for each SLS module
// ═══════════════════════════════════════════════════════════════
const EXCERPT = {
  title: "Ode to a Nightingale",
  author: "John Keats (1819)",
  lines: [
    "My heart aches, and a drowsy numbness pains",
    "My sense, as though of hemlock I had drunk,",
    "Or emptied some dull opiate to the drains",
    "One minute past, and Lethe-wards had sunk:",
    null,                                              // null = stanza break
    "'Tis not through envy of thy happy lot,",
    "But being too happy in thine happiness,—",
    "That thou, light-wingèd Dryad of the trees,",
    "In some melodious plot",
    "Of beechen green, and shadows numberless,",
    "Singest of summer in full-throated ease.",
    null,
    "O, for a draught of vintage! that hath been",
    "Cool'd a long age in the deep-delvèd earth,",
    "Tasting of Flora and the country green,",
    "Dance, and Provençal song, and sunburnt mirth!",
    "O for a beaker full of the warm South,",
    "Full of the true, the blushful Hippocrene,",
    "With beaded bubbles winking at the brim,",
    "And purple-stainèd mouth;",
    "That I might drink, and leave the world unseen,",
    "And with thee fade away into the forest dim:",
  ],
  // Glossary: word (as it appears in text, case-insensitive) → definition
  glossary: {
    "hemlock":    "a poisonous plant whose extract was used as a sedative or to cause death",
    "lethe":      "in Greek myth, the river of forgetfulness in the underworld",
    "dryad":      "a tree nymph or spirit of the forest in Greek mythology",
    "flora":      "the Roman goddess of flowers and spring",
    "provençal":  "relating to Provence, in southern France — associated with troubadour song",
    "hippocrene": "a fountain on Mount Helicon sacred to the Muses; its waters were said to inspire poetry",
  }
};

// Highlight categories — name, background colour, border/left-bar colour
const CATEGORIES = [
  { key: "imagery",   label: "Imagery",   bg: "rgba(90,180,140,0.28)",  border: "#2a9d6a" },
  { key: "sound",     label: "Sound",     bg: "rgba(90,140,230,0.28)",  border: "#3a6ed8" },
  { key: "tone",      label: "Tone",      bg: "rgba(220,90,90,0.28)",   border: "#c94040" },
  { key: "structure", label: "Structure", bg: "rgba(200,140,50,0.28)",  border: "#b07a10" },
  { key: "theme",     label: "Theme",     bg: "rgba(160,80,200,0.28)",  border: "#9040c0" },
];
// ═══════════════════════════════════════════════════════════════

let activeCategory = CATEGORIES[0].key;
let eraseMode = false;
let focusMode = false;
let annotations = [];   // { id, quote, cat, catLabel, color }

// DOM refs
const textPane    = document.getElementById('text-pane');
const eraseBtn    = document.getElementById('erase-btn');
const focusBtn    = document.getElementById('focus-btn');
const clearAllBtn = document.getElementById('clear-all-btn');
const annList     = document.getElementById('ann-list');
const notepad     = document.getElementById('notepad');
const tooltip     = document.getElementById('tooltip');

// ── populate toolbar meta
document.getElementById('tb-title').textContent  = EXCERPT.title;
document.getElementById('tb-author').textContent = EXCERPT.author;

// ── build swatches
const swatchGroup = document.getElementById('swatch-group');
CATEGORIES.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'swatch-btn' + (cat.key === activeCategory ? ' active' : '');
  btn.title = cat.label;
  btn.style.background = cat.border;
  btn.dataset.key = cat.key;
  btn.addEventListener('click', () => {
    activeCategory = cat.key;
    eraseMode = false;
    eraseBtn.classList.remove('active');
    document.querySelectorAll('.swatch-btn').forEach(b => b.classList.toggle('active', b.dataset.key === cat.key));
  });
  swatchGroup.appendChild(btn);
});

// ── build legend
const legendEl = document.getElementById('legend');
CATEGORIES.forEach(cat => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-dot" style="background:${cat.border};"></div><span>${cat.label}</span>`;
  legendEl.appendChild(item);
});

// ── build glossary panel
const glossSection = document.getElementById('gloss-section');
const glossList    = document.getElementById('gloss-list');
const hasGloss = EXCERPT.glossary && Object.keys(EXCERPT.glossary).length > 0;
if (hasGloss) {
  glossSection.style.display = '';
  Object.entries(EXCERPT.glossary).forEach(([term, def]) => {
    const d = document.createElement('div');
    d.className = 'gloss-item';
    d.innerHTML = `<span class="gloss-term">${term}</span> — <span class="gloss-def">${def}</span>`;
    glossList.appendChild(d);
  });
}

// ── build text
function glossify(raw) {
  if (!hasGloss) return raw;
  let result = raw;
  // sort by length desc so longer terms match first
  const terms = Object.keys(EXCERPT.glossary).sort((a,b) => b.length - a.length);
  terms.forEach(term => {
    const def = EXCERPT.glossary[term];
    const re = new RegExp(`\\b(${term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})\\b`, 'gi');
    result = result.replace(re, (m) =>
      `<span class="gloss-word" data-term="${term}" data-def="${def}">${m}</span>`
    );
  });
  return result;
}

let lineNum = 0;
EXCERPT.lines.forEach(line => {
  if (line === null) {
    const sb = document.createElement('div');
    sb.className = 'stanza-break';
    textPane.appendChild(sb);
    return;
  }
  lineNum++;
  const wrapper = document.createElement('div');
  wrapper.className = 'line-wrapper';
  wrapper.dataset.lineNum = lineNum;

  const numEl = document.createElement('div');
  numEl.className = 'line-num';
  numEl.textContent = lineNum % 5 === 0 ? lineNum : '';

  const textEl = document.createElement('div');
  textEl.className = 'line-text';
  textEl.innerHTML = glossify(line);

  // focus mode: click line to focus
  wrapper.addEventListener('click', (e) => {
    if (!focusMode) return;
    if (e.target.closest('.gloss-word')) return;
    document.querySelectorAll('.line-wrapper').forEach(w => w.classList.remove('focused-line'));
    wrapper.classList.add('focused-line');
  });

  wrapper.appendChild(numEl);
  wrapper.appendChild(textEl);
  textPane.appendChild(wrapper);
});

// ── glossary tooltip
textPane.addEventListener('mouseover', e => {
  const gw = e.target.closest('.gloss-word');
  if (!gw) return;
  document.getElementById('tip-term').textContent = gw.dataset.term;
  document.getElementById('tip-def').textContent  = gw.dataset.def;
  tooltip.style.display = 'block';
});
textPane.addEventListener('mousemove', e => {
  tooltip.style.left = (e.clientX + 12) + 'px';
  tooltip.style.top  = (e.clientY - 28) + 'px';
});
textPane.addEventListener('mouseout', e => {
  if (!e.target.closest('.gloss-word')) tooltip.style.display = 'none';
});

// ── highlight on mouseup (selection)
textPane.addEventListener('mouseup', (e) => {
  if (e.target.closest('.gloss-word') && !window.getSelection().toString().trim()) return;
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const quote = sel.toString().trim();
  if (!quote || quote.length < 1) return;

  if (eraseMode) { sel.removeAllRanges(); return; }

  const cat = CATEGORIES.find(c => c.key === activeCategory);

  try {
    const range = sel.getRangeAt(0);
    const mark = document.createElement('mark');
    mark.className = 'hl';
    mark.dataset.cat = cat.label;
    mark.dataset.key = cat.key;
    mark.style.background = cat.bg;
    mark.style.setProperty('--hl-border', cat.border);

    range.surroundContents(mark);

    const id = Date.now();
    mark.dataset.id = id;

    // click to remove
    mark.addEventListener('click', () => {
      if (!eraseMode) return;
      removeAnnotation(id, mark);
    });

    annotations.push({ id, quote: quote.slice(0, 60), cat: cat.key, catLabel: cat.label, color: cat.border });
    renderAnnList();
  } catch(err) { /* cross-node selection — skip */ }

  sel.removeAllRanges();
});

function removeAnnotation(id, markEl) {
  const parent = markEl.parentNode;
  while (markEl.firstChild) parent.insertBefore(markEl.firstChild, markEl);
  parent.removeChild(markEl);
  annotations = annotations.filter(a => a.id !== id);
  renderAnnList();
}

function renderAnnList() {
  annList.innerHTML = '';
  if (annotations.length === 0) {
    annList.innerHTML = '<span class="ann-empty">No highlights yet.</span>';
    return;
  }
  annotations.forEach(a => {
    const item = document.createElement('div');
    item.className = 'ann-item';
    item.style.borderLeftColor = a.color;
    item.innerHTML = `<div class="ann-quote">"${a.quote}${a.quote.length >= 60 ? '…' : ''}"</div><div class="ann-cat">${a.catLabel}</div>`;
    annList.appendChild(item);
  });
}

// ── erase button
eraseBtn.addEventListener('click', () => {
  eraseMode = !eraseMode;
  eraseBtn.classList.toggle('active', eraseMode);
  document.querySelectorAll('.swatch-btn').forEach(b => b.classList.remove('active'));
  if (!eraseMode) {
    const active = CATEGORIES.find(c => c.key === activeCategory);
    document.querySelector(`.swatch-btn[data-key="${active.key}"]`).classList.add('active');
  }
});

// ── focus mode
focusBtn.addEventListener('click', () => {
  focusMode = !focusMode;
  focusBtn.classList.toggle('active', focusMode);
  textPane.classList.toggle('focus-mode', focusMode);
  if (!focusMode) document.querySelectorAll('.line-wrapper').forEach(w => w.classList.remove('focused-line'));
  else if (EXCERPT.lines.filter(Boolean).length > 0) {
    textPane.querySelector('.line-wrapper')?.classList.add('focused-line');
  }
});

// ── clear all highlights
clearAllBtn.addEventListener('click', () => {
  document.querySelectorAll('mark.hl').forEach(m => {
    const p = m.parentNode;
    while (m.firstChild) p.insertBefore(m.firstChild, m);
    p.removeChild(m);
  });
  annotations = [];
  renderAnnList();
});

// ── clear notes
document.getElementById('clear-notes-btn').addEventListener('click', () => {
  notepad.value = '';
});
</script>
