<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Close Reading Annotator — Prose</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f5f3ee;
    --surface:   #ffffff;
    --border:    #e0dbd2;
    --border2:   #c8c2b8;
    --text:      #1c1a16;
    --text-2:    #6a6560;
    --text-3:    #a8a49e;
    --info-bg:   #eef3fb;
    --info-text: #2a52a0;
    --radius:    7px;
    --font-body: 'DM Sans', sans-serif;
    --font-prose: 'Libre Baskerville', serif;
    --font-mono: 'Courier New', monospace;
  }

  html, body {
    height: 100%; width: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: var(--font-body);
    color: var(--text);
    font-size: 14px;
  }

  .app {
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
    width: 100vw;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .title-block { flex: 1; min-width: 140px; }
  .title-block .ex-title  { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .title-block .ex-author { font-size: 11px; color: var(--text-2); }

  .sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }

  .swatch {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid transparent; cursor: pointer;
    outline: none; transition: transform 0.1s; flex-shrink: 0;
  }
  .swatch:hover { transform: scale(1.2); }
  .swatch.on { border-color: var(--text); }

  .tbtn {
    font-size: 11px; padding: 4px 10px;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text-2);
    cursor: pointer;
    font-family: var(--font-body);
    transition: background 0.1s, color 0.1s;
    white-space: nowrap;
  }
  .tbtn:hover { background: var(--bg); color: var(--text); }
  .tbtn.on { background: var(--info-bg); color: var(--info-text); border-color: #aabde0; }
  .tbtn:disabled { opacity: 0.4; cursor: not-allowed; }
  .cat-label { font-size: 11px; color: var(--text-3); white-space: nowrap; }

  /* ── BODY ── */
  .body {
    display: grid;
    grid-template-columns: 1fr 280px;
    min-height: 0;
  }

  /* ── TEXT PANE ── */
  .text-pane {
    overflow-y: auto;
    padding: 32px 40px 48px 32px;
    border-right: 1px solid var(--border);
    background: var(--surface);
  }

  /* each paragraph is a row: marker + text block */
  .para-row {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 22px;
  }
  .para-row:last-child { margin-bottom: 0; }

  .pm {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text-3);
    user-select: none;
    flex-shrink: 0;
    min-width: 20px;
    text-align: right;
    /* align marker to cap-height of first line */
    padding-top: 5px;
    line-height: 1;
  }

  .pt {
    font-family: var(--font-prose);
    font-size: 15px;
    line-height: 1.9;
    color: var(--text);
    flex: 1;
    cursor: text;
    /* subtle first-line indent to signal prose */
    text-indent: 1.4em;
  }

  mark.hl {
    border-radius: 3px;
    padding: 1px 0;
    cursor: pointer;
    position: relative;
  }
  mark.hl:hover::after {
    content: attr(data-cat);
    position: fixed;
    font-size: 10px;
    font-family: var(--font-body);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-2);
    padding: 3px 7px;
    border-radius: 5px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 200;
  }

  /* focus mode dims non-focused paragraphs */
  .text-pane.focus-mode .para-row:not(.focused) .pt { opacity: 0.15; }
  .para-row.focused .pt { opacity: 1; }

  .gw {
    border-bottom: 1.5px dashed var(--border2);
    cursor: help;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    display: grid;
    grid-template-rows: auto auto 1fr auto auto;
    min-height: 0;
    background: var(--bg);
  }

  .panel {
    border-bottom: 1px solid var(--border);
    padding: 12px 14px;
    background: var(--surface);
    overflow: hidden;
  }
  .panel.grow {
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    flex-shrink: 0;
  }
  .panel-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-3);
    font-weight: 500;
  }
  .panel-action {
    font-size: 10px; padding: 2px 7px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text-3);
    cursor: pointer;
    font-family: var(--font-body);
  }
  .panel-action:hover { color: var(--text); border-color: var(--border2); }

  .key-grid { display: flex; flex-direction: column; gap: 5px; }
  .key-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-2); }
  .key-dot  { width: 11px; height: 11px; border-radius: 2px; flex-shrink: 0; }

  .notes-ta {
    flex: 1; width: 100%; resize: none;
    border: none; outline: none;
    font-family: var(--font-body);
    font-size: 12px; line-height: 1.7;
    color: var(--text); background: transparent; min-height: 0;
  }
  .notes-ta::placeholder { color: var(--text-3); }

  .log-list {
    display: flex; flex-direction: column; gap: 5px;
    max-height: 160px; overflow-y: auto;
  }
  .log-item {
    font-size: 11px; padding: 5px 8px;
    border-radius: var(--radius);
    background: var(--bg);
    border-left: 3px solid;
  }
  .log-q { font-style: italic; font-family: var(--font-prose); font-size: 11px; color: var(--text); margin-bottom: 2px; }
  .log-c { font-size: 10px; color: var(--text-2); }
  .log-empty { font-size: 11px; color: var(--text-3); font-style: italic; }

  .gloss-head {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .gloss-badge {
    font-size: 9px; padding: 2px 6px;
    border-radius: 10px;
    background: var(--info-bg);
    color: var(--info-text);
    font-weight: 500;
  }
  .gloss-list {
    display: flex; flex-direction: column; gap: 6px;
    max-height: 180px; overflow-y: auto;
  }
  .gloss-entry { font-size: 11px; line-height: 1.5; }
  .gloss-term { font-weight: 500; color: var(--text); }
  .gloss-def  { color: var(--text-2); }
  .gloss-empty { font-size: 11px; color: var(--text-3); font-style: italic; }

  #tip {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    font-size: 12px;
    max-width: 230px;
    z-index: 999;
    pointer-events: none;
    display: none;
    color: var(--text-2);
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  #tip strong { display: block; color: var(--text); margin-bottom: 2px; font-size: 12px; }
</style>
</head>
<body>

<div id="tip"><strong id="tip-term"></strong><span id="tip-def"></span></div>

<div class="app">

  <div class="toolbar">
    <div class="title-block">
      <div class="ex-title"  id="tb-title"></div>
      <div class="ex-author" id="tb-author"></div>
    </div>
    <div class="sep"></div>
    <span class="cat-label">Highlight as:</span>
    <div id="swatches" style="display:flex;gap:5px;align-items:center;"></div>
    <div class="sep"></div>
    <button class="tbtn" id="erase-btn">Erase</button>
    <button class="tbtn" id="focus-btn">Focus mode</button>
    <button class="tbtn" id="clear-btn">Clear all</button>
  </div>

  <div class="body">

    <div class="text-pane" id="text-pane"></div>

    <div class="sidebar">

      <div class="panel">
        <div class="panel-label">Highlight key</div>
        <div class="key-grid" id="key-grid"></div>
      </div>

      <div class="panel grow">
        <div class="panel-head">
          <span class="panel-label">Notes</span>
          <button class="panel-action" id="clear-notes">clear</button>
        </div>
        <textarea class="notes-ta" id="notes" placeholder="Observations, patterns, draft response…"></textarea>
      </div>

      <div class="panel">
        <div class="panel-label" style="margin-bottom:8px;">Highlights log</div>
        <div class="log-list" id="log-list"><span class="log-empty">No highlights yet.</span></div>
      </div>

      <div class="panel">
        <div class="gloss-head">
          <span class="panel-label">Glossary</span>
          <div style="display:flex;align-items:center;gap:6px;">
            <span id="gloss-badge"></span>
            <button class="tbtn" id="gen-btn" style="font-size:10px;padding:3px 8px;">Auto-generate</button>
          </div>
        </div>
        <div class="gloss-list" id="gloss-list"><span class="gloss-empty">—</span></div>
      </div>

    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  HOW TO SET UP THIS FILE FOR A NEW MODULE
//  ─────────────────────────────────────────
//  1. Edit ONLY the CONFIG block below — do not touch anything else.
//  2. API_ENDPOINT — URL for the Auto-generate glossary call.
//       • Inside claude.ai (artifact/SLS embed): keep as the Anthropic URL below.
//       • On GitHub Pages / local file: replace with your proxy URL,
//         e.g. "https://your-worker.workers.dev/api/claude"
//         The proxy should forward requests to api.anthropic.com and
//         inject the API key server-side (never embed keys in this file).
//  3. title   — the extract title (e.g. novel name + chapter)
//  4. author  — author name and year e.g. "Jane Austen (1818)"
//  5. lines   — each paragraph as a single string in double quotes,
//               followed by a comma. Keep each paragraph on one line,
//               however long it is. Example:
//                 "It was a truth universally acknowledged...",
//                 "However little known the feelings...",
//  6. null    — insert a section break between paragraphs if needed:
//                 null,
//  7. glossary — optional. Add terms as "word": "definition" pairs,
//               or leave as {} and use the Auto-generate button.
//
//  NOTE: Unlike the poetry template, there are no line numbers here —
//  paragraphs are marked with ¶1, ¶2 etc. in the left margin.
//  Focus mode dims all paragraphs except the one you click.
// ═══════════════════════════════════════════════════════════════════════

const API_ENDPOINT = "https://api.anthropic.com/v1/messages";

const EXCERPT = {
  title: "The Great Gatsby — Chapter 2",
  author: "F. Scott Fitzgerald (1925)",
  lines: [
    "They were on the Cobb; the party had taken the steps down to the lower Cobb; Captain Wentworth, Captain Harville, and Louisa were all at the top of the steps, Charles Musgrove was at the bottom.",
    "Louisa was to be jumped down the steps by Captain Wentworth, as they had been talking of doing at Lyme. She was determined to have the air of flying; she ran forward and threw herself off; he did not catch her—she fell on the pavement on the Lower Cobb, and was taken up lifeless.",
    "There was no wound, no blood, no visible bruise; but her eyes were closed, she breathed not, there was no motion, she was insensible.",
    "Anne, attending with all the strength and zeal, and thought, which instinct supplied, to Henrietta, still tried—all her own agitation, and Anne's, was no more than proper; and Captain Benwick, who had at last got the whole story, kept his place near Louisa, and tried to be steady, though his features worked with evident emotion.",
    "Captain Wentworth, who had caught her up, knelt with her in his arms, looking on her with a face as pallid as her own, in an agony of silence. 'Is there no one to help me?' were the first words which burst from him.",
  ],
  glossary: {
    "Cobb":       "the famous curved stone harbour wall at Lyme Regis, Dorset, a promenade and social space",
    "insensible": "archaic: unconscious, without sensation; not merely unfeeling but physically inert",
    "pallid":     "unusually pale, especially from illness, shock, or fear",
    "agony":      "here used in its older sense of intense mental anguish or suspense, not necessarily physical pain",
  }
};

const CATS = [
  { key:"narration",  label:"Narration",  bg:"rgba(45,157,106,0.22)", border:"#2a9d6a" },
  { key:"character",  label:"Character",  bg:"rgba(58,110,216,0.22)", border:"#3a6ed8" },
  { key:"tone",       label:"Tone",       bg:"rgba(201,64,64,0.22)",  border:"#c94040" },
  { key:"structure",  label:"Structure",  bg:"rgba(176,122,16,0.22)", border:"#b07a10" },
  { key:"theme",      label:"Theme",      bg:"rgba(144,64,192,0.22)", border:"#9040c0" },
];
// ═══════════════════════════════════════════════════════════════════════

let activeCat = CATS[0].key;
let eraseMode = false;
let focusMode = false;
let anns = [];
let glossary = { ...EXCERPT.glossary };

const textPane = document.getElementById('text-pane');
const logList  = document.getElementById('log-list');
const glossDiv = document.getElementById('gloss-list');
const tip      = document.getElementById('tip');

document.getElementById('tb-title').textContent  = EXCERPT.title;
document.getElementById('tb-author').textContent = EXCERPT.author;
buildSwatches();
buildKey();
buildText();
renderGloss(Object.keys(glossary).length ? 'config' : null);

// ── BUILD UI ──────────────────────────────────────────

function buildSwatches() {
  const c = document.getElementById('swatches');
  CATS.forEach(cat => {
    const b = document.createElement('button');
    b.className = 'swatch' + (cat.key === activeCat ? ' on' : '');
    b.style.background = cat.border;
    b.title = cat.label;
    b.dataset.key = cat.key;
    b.onclick = function() {
      activeCat = this.dataset.key; eraseMode = false;
      document.getElementById('erase-btn').classList.remove('on');
      document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('on', s.dataset.key === activeCat));
    };
    c.appendChild(b);
  });
}

function buildKey() {
  const g = document.getElementById('key-grid');
  CATS.forEach(cat => {
    const d = document.createElement('div');
    d.className = 'key-item';
    d.innerHTML = `<div class="key-dot" style="background:${cat.border}"></div><span>${cat.label}</span>`;
    g.appendChild(d);
  });
}

function glossify(raw) {
  if (!Object.keys(glossary).length) return raw;
  let out = raw;
  Object.keys(glossary).sort((a,b) => b.length - a.length).forEach(term => {
    const def = glossary[term];
    const re = new RegExp(`\\b(${term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})\\b`, 'gi');
    out = out.replace(re, m =>
      `<span class="gw" data-term="${term}" data-def="${def.replace(/"/g,'&quot;')}">${m}</span>`
    );
  });
  return out;
}

function buildText() {
  textPane.innerHTML = '';
  let n = 0;
  EXCERPT.lines.forEach(line => {
    if (line === null) {
      // section break — small ruled gap
      const br = document.createElement('div');
      br.style.cssText = 'height:20px;display:flex;align-items:center;padding-left:36px;';
      br.innerHTML = '<div style="width:40px;height:1px;background:var(--border2);"></div>';
      textPane.appendChild(br);
      return;
    }
    n++;
    const row = document.createElement('div');
    row.className = 'para-row';
    row.dataset.n = n;

    const pm = document.createElement('div');
    pm.className = 'pm';
    pm.textContent = '¶' + n;

    const pt = document.createElement('div');
    pt.className = 'pt';
    pt.innerHTML = glossify(line);

    row.addEventListener('click', e => {
      if (!focusMode || e.target.closest('.gw')) return;
      document.querySelectorAll('.para-row').forEach(r => r.classList.remove('focused'));
      row.classList.add('focused');
    });

    row.appendChild(pm);
    row.appendChild(pt);
    textPane.appendChild(row);
  });
}

// ── GLOSSARY ─────────────────────────────────────────

function renderGloss(source) {
  glossDiv.innerHTML = '';
  document.getElementById('gloss-badge').innerHTML =
    source === 'ai' ? '<span class="gloss-badge">AI generated</span>' : '';

  const entries = Object.entries(glossary);
  if (!entries.length) {
    glossDiv.innerHTML = '<span class="gloss-empty">Click Auto-generate to build a glossary.</span>';
    return;
  }
  entries.forEach(([t,d]) => {
    const el = document.createElement('div');
    el.className = 'gloss-entry';
    el.innerHTML = `<span class="gloss-term">${t}</span> — <span class="gloss-def">${d}</span>`;
    glossDiv.appendChild(el);
  });
}

document.getElementById('gen-btn').addEventListener('click', async () => {
  const btn = document.getElementById('gen-btn');
  btn.disabled = true; btn.textContent = 'Generating…';
  glossDiv.innerHTML = '<span class="gloss-empty" style="font-style:italic;">Calling API…</span>';

  const body = EXCERPT.lines.filter(Boolean).join('\n\n');
  const prompt = `You are a literary annotation assistant specialising in British Romantic-period prose (1785–1832).

Analyse the following prose extract and identify terms that A-level students would benefit from having glossed. Prioritise:
1. Archaic or unfamiliar diction (words whose meanings have shifted)
2. Terms with specific historical or social context (settings, ranks, customs)
3. Literary/rhetorical techniques enacted in the prose (only if genuinely present)
4. Words used in an older or specialised sense that differs from modern usage

Return ONLY a valid JSON object. No preamble, no markdown fences.
Format: {"term": "definition", "term2": "definition2"}
Rules: terms must appear verbatim in the text; definitions one sentence max, context-specific; 5–10 terms; no common modern words.

Title: ${EXCERPT.title}
Author: ${EXCERPT.author}
Text:\n${body}`;

  try {
    const res = await fetch(API_ENDPOINT, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    const raw = data.content.find(b => b.type === 'text')?.text || '{}';
    const ai = JSON.parse(raw.replace(/```json|```/g, '').trim());
    glossary = { ...ai, ...EXCERPT.glossary };
    buildText();
    renderGloss('ai');
  } catch(e) {
    glossDiv.innerHTML = '<span class="gloss-empty" style="color:#c94040;">Generation failed.</span>';
    glossary = { ...EXCERPT.glossary };
    buildText();
    renderGloss('config');
  }
  btn.textContent = 'Regenerate'; btn.disabled = false;
});

// ── TOOLBAR ACTIONS ───────────────────────────────────

document.getElementById('erase-btn').addEventListener('click', () => {
  eraseMode = !eraseMode;
  document.getElementById('erase-btn').classList.toggle('on', eraseMode);
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('on'));
  if (!eraseMode) document.querySelector(`.swatch[data-key="${activeCat}"]`)?.classList.add('on');
});

document.getElementById('focus-btn').addEventListener('click', () => {
  focusMode = !focusMode;
  document.getElementById('focus-btn').classList.toggle('on', focusMode);
  textPane.classList.toggle('focus-mode', focusMode);
  if (!focusMode) document.querySelectorAll('.para-row').forEach(r => r.classList.remove('focused'));
  else textPane.querySelector('.para-row')?.classList.add('focused');
});

document.getElementById('clear-btn').addEventListener('click', () => {
  document.querySelectorAll('mark.hl').forEach(m => {
    const p = m.parentNode;
    while (m.firstChild) p.insertBefore(m.firstChild, m);
    p.removeChild(m);
  });
  anns = []; renderLog();
});

document.getElementById('clear-notes').addEventListener('click', () => {
  document.getElementById('notes').value = '';
});

// ── HIGHLIGHTING ──────────────────────────────────────

textPane.addEventListener('mouseup', () => {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const q = sel.toString().trim();
  if (!q || eraseMode) { sel.removeAllRanges(); return; }
  const cat = CATS.find(c => c.key === activeCat);
  try {
    const range = sel.getRangeAt(0);
    const mark = document.createElement('mark');
    mark.className = 'hl';
    mark.dataset.cat = cat.label;
    mark.style.background = cat.bg;
    const id = Date.now();
    mark.dataset.id = id;
    range.surroundContents(mark);
    mark.addEventListener('click', () => { if (eraseMode) removeAnn(id, mark); });
    anns.push({ id, q: q.slice(0,60), catLabel: cat.label, color: cat.border });
    renderLog();
  } catch(e) {}
  sel.removeAllRanges();
});

function removeAnn(id, el) {
  const p = el.parentNode;
  while (el.firstChild) p.insertBefore(el.firstChild, el);
  p.removeChild(el);
  anns = anns.filter(a => a.id !== id);
  renderLog();
}

function renderLog() {
  logList.innerHTML = '';
  if (!anns.length) { logList.innerHTML = '<span class="log-empty">No highlights yet.</span>'; return; }
  anns.forEach(a => {
    const el = document.createElement('div');
    el.className = 'log-item';
    el.style.borderLeftColor = a.color;
    el.innerHTML = `<div class="log-q">"${a.q}${a.q.length>=60?'…':''}"</div><div class="log-c">${a.catLabel}</div>`;
    logList.appendChild(el);
  });
}

// ── TOOLTIP ───────────────────────────────────────────

textPane.addEventListener('mouseover', e => {
  const gw = e.target.closest('.gw');
  if (!gw) return;
  document.getElementById('tip-term').textContent = gw.dataset.term;
  document.getElementById('tip-def').textContent  = gw.dataset.def;
  tip.style.display = 'block';
});
textPane.addEventListener('mousemove', e => {
  tip.style.left = (e.clientX + 14) + 'px';
  tip.style.top  = (e.clientY - 38) + 'px';
});
textPane.addEventListener('mouseout', e => {
  if (!e.target.closest('.gw')) tip.style.display = 'none';
});
</script>
</body>
</html>
